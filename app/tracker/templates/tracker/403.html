<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Запрещено. HabitTracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #FFCCCC;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .error-container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: #FF9999;
            margin: 0;
        }
        .error-message {
            font-size: 24px;
            color: #333;
            margin: 20px 0;
        }
        .back-link {
            color: #FF9999;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            color: #ff6666;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="error-code">403 ошибка</h1>
        <p class="error-message">Запрещено</p>
        <p>У вас нет доступа к этой странице</p>
        <a href="{% url 'dashboard' %}" class="back-link">← Вернуться на главную</a>
    </div>
</body>
</html>
