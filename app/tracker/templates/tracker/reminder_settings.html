<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройка напоминаний - HabitTracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #FFCCCC;
        }
        .navbar {
            background-color: #FF9999 !important;
        }

        .btn-primary {
            background-color: #ed697d !important;
            border-color: #ed697d !important;
            color: #ffffff !important;
        }

        .btn-primary:hover {
            background-color: #d4556a !important;
            border-color: #d4556a !important;
        }

        .btn-outline-primary {
            color: #ed697d !important;
            border-color: #ed697d !important;
        }

        .btn-outline-primary:hover {
            background-color: #ed697d !important;
            border-color: #ed697d !important;
            color: #ffffff !important;
        }   

        a[href*="dashboard"] {
            color: #ed697d !important;
            text-decoration: none !important;
        }       

        a[href*="dashboard"]:hover {
            color: #d4556a !important;
            text-decoration: underline !important;
        }

        a[href*="dashboard"],
        a:contains("На главную") {
            text-decoration: underline !important;
        }

        .form-check-input {
            accent-color: #ed697d !important;
        }

        .form-check-input:checked {
            background-color: #ed697d !important;
            border-color: #ed697d !important;
        }

        input[type="checkbox"] {
            accent-color: #ed697d;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">HabitTracker</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4">Настройка напоминаний</h2>
                        <h5 class="mb-3 text-muted">{{ habit.name }}</h5>

                        <form method="post">
                            {% csrf_token %}

                            <div class="mb-3 form-check">
                                {{ form.reminder_enabled }}
                                <label class="form-check-label" for="{{ form.reminder_enabled.id_for_label }}">
                                    Включить email-напоминания
                                </label>
                            </div>

                            <div class="mb-3">
                                {{ form.reminder_time.label_tag }}
                                {{ form.reminder_time }}
                                <div class="form-text">
                                    Напоминания будут приходить в указанное время в дни выполнения привычки
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Сохранить настройки</button>
                        </form>

                        <div class="text-center mt-3">
                            <a href="{% url 'dashboard' %}">На главную</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const checkbox = document.getElementById('{{ form.reminder_enabled.id_for_label }}');
        const timeField = document.getElementById('{{ form.reminder_time.id_for_label }}');
        
        function toggleTimeField() {
            if (checkbox.checked) {
                timeField.parentElement.style.display = 'block';
                timeField.required = true;
            } else {
                timeField.parentElement.style.display = 'none';
                timeField.required = false;
            }
        }
        
        toggleTimeField();
        checkbox.addEventListener('change', toggleTimeField);
    </script>
</body>
</html>
