<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная - HabitTracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <style>
        /* Верхняя панель */
        .navbar {
            background-color: #FF9999 !important;
        }
        
        /* Основной фон страницы */
        body {
            background-color: #FFCCCC;
        }
        
        /* Блок с инфой*/
        .alert-info {
            background-color: #ffe6e6 !important;
            border-color: #ffcccc !important;
            color: #333 !important;
        }
        
        /* Ссылки в меню */
        .navbar-nav .nav-link {
            color: #333 !important;
        }
        
        .navbar-nav .nav-link:hover {
            color: #000 !important;
        }
        
        /* Название */
        .navbar-brand {
            color: #333 !important;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">HabitTracker</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-item nav-link text-white">Привет, {{ user.username }}!</span>
                <a class="nav-item nav-link" href="{% url 'logout' %}">Выйти</a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <h1>Добро пожаловать, {{ user.username }}!!!!</h1>
        <p class="lead">Это ваша главная страница. Здесь будет список привычек</p>
        
        <div class="alert alert-info">
            <strong> Скоро здесь будет:</strong>
            <ul>
                <li>Список ваших привычек</li>
                <li>Кнопка добавления новой привычки</li>
                <li>Статистика выполнения</li>
            </ul>
        </div>
    </div>
</body>
</html>
